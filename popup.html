<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快密生成器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="card" aria-label="快密生成器">
    <header class="header">
      <div>
        <p class="eyebrow">Chrome 扩展</p>
        <h1>快密生成器</h1>
      </div>
      <span class="badge">本地安全</span>
    </header>

    <section class="settings" aria-label="密码设置">
      <div class="length-row">
        <label for="length">密码长度</label>
        <input id="lengthValue" class="length-input" type="number" min="8" max="32" value="16" inputmode="numeric" aria-label="密码长度数值">
      </div>
      <input id="length" type="range" min="8" max="32" value="16">

      <div class="option-grid">
        <label><input id="uppercase" type="checkbox" checked> 大写字母</label>
        <label><input id="lowercase" type="checkbox" checked> 小写字母</label>
        <label><input id="numbers" type="checkbox" checked> 数字</label>
        <label><input id="symbols" type="checkbox" checked> 特殊符号</label>
      </div>

      <label class="wide-option"><input id="excludeAmbiguous" type="checkbox"> 排除易混淆字符</label>
    </section>

    <section class="strength" aria-live="polite">
      <div><span>强度</span><strong id="strengthLabel">很强</strong></div>
      <div class="strength-bar"><span id="strengthBar"></span></div>
    </section>

    <section class="result" aria-label="生成结果">
      <label for="password">生成的密码</label>
      <textarea id="password" readonly rows="2"></textarea>
      <div class="actions">
        <button id="generate" type="button">重新生成</button>
        <button id="copy" type="button" class="primary">复制密码</button>
      </div>
      <p id="message" role="status"></p>
    </section>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
